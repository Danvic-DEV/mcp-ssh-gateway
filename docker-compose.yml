name: mcp-ssh-gateway

services:
  mcp-ssh-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-ssh-gateway
    
    # Expose port for HTTP server
    ports:
      - "8005:8000"
    
    # Runtime environment variables
    environment:
      # SSH variables
      - SSH_HOST=${SSH_HOST:-localhost}
      - SSH_USER=${SSH_USER:-root}
      - SSH_PASSWORD=${SSH_PASSWORD}
      - SSH_KEY_FILE=${SSH_KEY_FILE:-/app/ssh_keys/id_ed25519}
      - SSH_PORT=${SSH_PORT:-22}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - CLIENT_ID=${CLIENT_ID:-}
      - CLIENT_SECRET=${CLIENT_SECRET:-}
      # Server configuration
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000

    # Persist SSH keys across container restarts
    volumes:
      - mcp_ssh_gateway_keys:/app/ssh_keys

    # Restart container in case of error
    restart: unless-stopped
    
    # Network connections
    networks:
      - mcp-ssh-gateway-network
      - backend

networks:
  mcp-ssh-gateway-network:
    driver: bridge
  backend:
    external: true
    name: llm-rag-mcp_backend

volumes:
  mcp_ssh_gateway_keys:
